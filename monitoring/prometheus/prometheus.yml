global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'api_gateway'
    static_configs:
      - targets: ['api_gateway:3000']

  - job_name: 'auth_service'
    static_configs:
      - targets: ['auth:4000']

  - job_name: 'notification_service'
    static_configs:
      - targets: ['notification:4000']

  - job_name: 'post_service'
    static_configs:
      - targets: ['posts:4000']

  - job_name: 'chat_service'
    static_configs:
      - targets: ['chat:4000']
