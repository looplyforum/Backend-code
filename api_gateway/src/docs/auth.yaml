openapi: 3.0.0

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterInput:
      type: object
      required:
        - email
        - phone
        - password
        - fieldOfStudy
        - fieldOfInterest
        - dateOfBirth
      properties:
        email:
          type: string
          example: test@example.com
        phone:
          type: string
          example: "9876543210"
        password:
          type: string
          example: StrongPassword123
        fieldOfStudy:
          type: string
          example: Computer Science
        fieldOfInterest:
          type: string
          example: Backend Development
        dateOfBirth:
          type: string
          format: date
          example: 2000-01-01

    LoginInput:
      type: object
      properties:
        email:
          type: string
        phone:
          type: string
        password:
          type: string

paths:

  /auth/health:
    get:
      tags:
        - Auth
      summary: Auth service health check
      responses:
        200:
          description: Auth service running

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        201:
          description: User registered successfully
        409:
          description: User already exists

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /auth/google:
    post:
      tags:
        - Auth
      summary: Login with Google (WIP)
      responses:
        200:
          description: Under development

  /auth/verify-user:
    get:
      tags:
        - Auth
      summary: Verify email using token
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        200:
          description: Email verified

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        200:
          description: Logged out successfully

  /auth/update-profile:
    post:
      tags:
        - Auth
      summary: Update user profile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Profile updated

  /auth/update-profile-picture:
    post:
      tags:
        - Auth
      summary: Upload profile picture
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePicture:
                  type: string
                  format: binary
      responses:
        200:
          description: Profile picture updated

  /auth/delete-user:
    delete:
      tags:
        - Auth
      summary: Delete user account
      security:
        - BearerAuth: []
      responses:
        200:
          description: Account deleted

  /auth/get-user:
    get:
      tags:
        - Auth
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        200:
          description: User fetched successfully